services:
  php:
    image: php:8.4-fpm
    container_name: booking_php
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: booking_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - php

  db:
    image: mysql:8.0
    container_name: booking_db
    restart: always
    environment:
      MYSQL_DATABASE: booking
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: